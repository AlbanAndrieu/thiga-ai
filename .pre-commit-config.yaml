#     hooks:
#     -   id: bashate
#         name: "🐚 shell · Check shell script code style"
#         args: [-i, "E003,E006"]
#         exclude: >
#           (?x)^(
#             .envrc|
#           )$


    ### Notebooks ###
-   repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
    -   id: nbqa
        entry: nbqa mdformat
        name: "📓 notebook · Format markdown cells"
        args: ["--nbqa-md"]
        types: [jupyter]
        additional_dependencies:
        -   mdformat
        -   mdformat-gfm
        -   mdformat-ruff
        -   mdformat-frontmatter
        -   ruff
        # - id: nbqa-mypy
        #   name: "📓 notebook · Type-check cells"

    ### Javascript & Web Tools ###
-   repo: https://github.com/biomejs/pre-commit
    rev: "v2.5.4"
    hooks:
    -   id: biome-check
        name: "🟨 javascript · Lint, format, and safe fixes with Biome"
        additional_dependencies: ["@biomejs/biome@1.9.4"]
        exclude: >
          (?x)^(
              trivy-sbom.json|
          )$

-   repo: https://github.com/Lucas-C/pre-commit-hooks-nodejs
    rev: v1.1.2
    hooks:
    -   id: htmllint
        name: "📝 html · Lint html"
        args: [--config, .eslintrc.json]
        files: ^src/
    -   id: htmlhint
        name: "📝 html · Hint html"
        args: [--config, .htmlhintrc]
        exclude: >
          (?x)^(
            public/reports/.*|
          )$
    -   id: markdown-toc
        name: "📝 markdown · Toc markdown"
        args: [--maxdepth, "3", -i]

    ### Additional File Types ###
-   repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
    -   id: prettier
        name: "✨ misc-files · Format misc web files"
        types_or: [yaml, html, scss]
        additional_dependencies:
        -   prettier@3.4.2
        exclude: >
          (?x)^(
            trivy-sbom.json|
            pnpm-lock.yaml|
            .pre-commit-config.yaml|
          )$

    ### Data & Config Validation ###
-   repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
    -   id: check-github-workflows
        name: "🧩 github-actions · Validate gh workflow files"
        args: ["--verbose"]
    -   id: check-taskfile
        name: "✅ taskfile · Validate Task configuration"

    # ----------------------------- 🔒 Deployment Tools ---------------------------- #
-   repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
    -   id: hadolint-docker
        name: "🐳 hadolint · Validate Dockerfile"

    # ----------------------------- 🔒 Security Tools ---------------------------- #

# -   repo: https://github.com/PyCQA/bandit
#     rev: 1.9.4
#     hooks:
#     -   id: bandit
#         name: "🔒 security · Detect security issues"
#         args: [-c, .bandit.yml]
#         exclude: >
#           (?x)^(
#             noxfile.py|
#             versioneer.py|
#             hooks/_version.py|
#           )$

-   repo: https://github.com/IamTheFij/ansible-pre-commit
    rev: v1.0.1
    hooks:
    -   id: encryption-check
        name: "🔒 security · Detect encryption"

-   repo: https://github.com/zricethezav/gitleaks
    rev: v8.30.1
    hooks:
    -   id: gitleaks-docker
        name: "🔒 🐳 security · Detect hardcoded secrets"
        entry: zricethezav/gitleaks protect --verbose --redact --staged

-   repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
    -   id: yamllint
        name: "📜 yamllint - Lint Yaml"
        args: [--format, parsable, --strict]
        exclude: >
          (?x)^(
            .pnp.cjs|
            package-lock.json|
            npm-shrinkwrap.json|
            poetry.lock|
            Pipfile.lock|
            yarn.lock|
            sbom.json|
            pnpm-lock.yaml|
            .sops.yaml|
          )$
