---
include:
  - path:
      - langfuse/docker-compose.yml
      - docker-compose-langfuse.init.yml

  - path: litellm/docker-compose.yml

services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    tty: true
    restart: unless-stopped
    gpus: all
    ports:
      - ${OLLAMA_PORT:-11434}:${OLLAMA_PORT:-11434}
    environment:
      - TZ=Europe/Paris
      - OLLAMA_HOST=0.0.0.0:${OLLAMA_PORT:-11434}
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      # - OLLAMA_MAX_QUEUE=4
      # - CUDA_VISIBLE_DEVICES="" # force CPU, no GPU
      - OLLAMA_CONTEXT_LENGTH=4096 # 32768 too big for RTX 2060
      # - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_MODELS=/workspace/models/ollama
      # - OLLAMA_GPU_OVERHEAD=268435456
      # - OLLAMA_KV_CACHE_TYPE=q8_0
      # - OLLAMA_API_KEY=XXX
    volumes:
      - ollama:/root/.ollama
      - /workspace/models/ollama:/workspace/models/ollama

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    restart: "no"
    entrypoint: >
      sh -c "
      sleep 10 &&
      OLLAMA_HOST=http://ollama:${OLLAMA_PORT:-11434} ollama pull llama3.2
      "

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-31028}:8080
    environment:
      - TZ=Europe/Paris
      - DEFAULT_LOCALE=en-US
      # - OLLAMA_BASE_URL=http://ollama:${OLLAMA_PORT:-11434}
      # - OLLAMA_BASE_URLS=http://ollama:${OLLAMA_PORT:-11434}
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - ENABLE_OPENAI_API=true
      - ENABLE_OLLAMA_API=true # TODO false for security hardening
      - DEFAULT_MODELS=qwen3.5:2b
      - DEFAULT_PINNED_MODELS=qwen3.5:2b
      # Optional, only if you also want OpenAI-compatible pipeline
      - OPENAI_API_BASE_URL=http://pipelines:9099
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # - OPENAI_API_KEY=XXX
      - WEBUI_ADMIN_NAME=${WEBUI_ADMIN_NAME:-Nabla}
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-alban.andrieu@free.fr}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-ChooseAVeryStrongPassword}
      - ENABLE_SIGNUP=false
    extra_hosts:
      - host.docker.internal:host-gateway

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    restart: unless-stopped
    volumes:
      - pipelines:/app/pipelines
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - 9099:9099
    depends_on:
      - langfuse-web

volumes:
  ollama: {}
  open-webui: {}
  pipelines: {}
