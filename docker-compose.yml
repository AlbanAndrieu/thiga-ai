---
include:
  - path:
      - langfuse/docker-compose.yml
      # - docker-compose-langfuse.override.yml

  - path: litellm/docker-compose.yml

services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    tty: true
    restart: unless-stopped
    gpus: all
    ports:
      - ${OLLAMA_PORT:-11434}:${OLLAMA_PORT:-11434}
    environment:
      - TZ=Europe/Paris
      - OLLAMA_HOST=0.0.0.0:${OLLAMA_PORT:-11434}
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      # - OLLAMA_MAX_QUEUE=4
      - OLLAMA_MODELS=/workspace/models/ollama
      # - CUDA_VISIBLE_DEVICES="" # force CPU, no GPU
      # Below are GPU Optimization
      - OLLAMA_CONTEXT_LENGTH=4096 # 32768 too big for RTX 2060, could go up to 262144
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_GPU_OVERHEAD=268435456 # This reserves 256 MB of VRAM and helps avoid CUDA OOM errors.
      # - OLLAMA_API_KEY=XXX
    volumes:
      - ollama:/root/.ollama
      - /workspace/models/ollama:/workspace/models/ollama
      - /data:/data

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    restart: "no"
    entrypoint: >
      sh -c '
      sleep 10 &&
      OLLAMA_HOST=http://ollama:11434 ollama pull qwen3:4b &&
      curl -s http://ollama:11434/api/generate \
      -H "Content-Type: application/json" \
      -d "{\"model\":\"qwen3:4b\",\"prompt\":\"ping\",\"stream\":false,\"options\":{\"num_predict\":1}}" \
      >/dev/null
      '

#      OLLAMA_HOST=http://ollama:11434 ollama run qwen3:4b "ping" >/dev/null

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-31028}:8080
    environment:
      - TZ=Europe/Paris
      - DEFAULT_LOCALE=en-US
      # - OLLAMA_BASE_URL=http://ollama:${OLLAMA_PORT:-11434}
      # - OLLAMA_BASE_URLS=http://ollama:${OLLAMA_PORT:-11434}
      # Optional, only if you also want OpenAI-compatible pipeline
      # - OPENAI_API_BASE_URL=http://pipelines:9099
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - ENABLE_OPENAI_API=true
      - ENABLE_OLLAMA_API=false # To use litellm
      - DEFAULT_MODELS=qwen # qwen3.5:2b
      - DEFAULT_PINNED_MODELS=qwen # qwen3.5:2b
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_ADMIN_NAME=${WEBUI_ADMIN_NAME:-Nabla}
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-alban.andrieu@free.fr}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-ChooseAVeryStrongPassword}
      - ENABLE_DIRECT_CONNECTIONS=false
      - ENABLE_SIGNUP=false
      - ENABLE_ADMIN_EXPORT=false
      - ENABLE_COMMUNITY_SHARING=false
      - ENABLE_PERSISTENT_CONFIG=false
      - ENABLE_DIRECT_CONNECTIONS=false
    extra_hosts:
      - host.docker.internal:host-gateway

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    restart: unless-stopped
    volumes:
      - pipelines:/app/pipelines
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - 9099:9099
    depends_on:
      - langfuse-web

volumes:
  ollama: {}
  open-webui: {}
  pipelines: {}
